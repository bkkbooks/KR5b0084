front:
  text: 洞玄靈寶定觀經注推五
  hash: sha256:153ceef799e2d29cfac6c4d27a04a0733062b4c1588c372f59a148df25484696
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0084_HFL_000-001a, image: hfl/0189/0189-062.png}
body:
  text: 靈者神也在天曰靈寶者珍也在地曰寶天有靈化神用不測則廣覆無邉地有衆寶濟養羣品則厚載萬物言此經如天如也能覆能載有靈有寶功德無窮證得此心故名靈寶定者心定也如地不動觀者慧觀也如天常照定體無念慧照無邊定慧等修故名定觀天尊告左玄真人曰左者定也玄者深妙也真者純也一而無雜人者通理違性之人也曰者語辭也夫欲修道進趣之心名為修道先能捨事一切無染名為捨事外事都絶六塵為外事須遠離也六塵者色聲香味觸法更不染著名為都絶無與忤心境不來忤心即無惱心不起染塊則無煩心境兩忘即無煩惱故名無與忤心然後安坐攝澄煩惱名之為安本心不起名之為坐內觀心起若覺一念起須除滅務今安靜慧心內照名曰內觀漏念未除名為心起前念忽起後覺則隨起心既滅覺照亦忘故稱除滅了心不起名之為安覺性不動名之為靜故稱安靜其次雖非的有貪著浮遊亂想亦盡滅除衆心不起妄念悉忘亂想不生何有貪著故曰滅除畫夜勤行須史不替畫之言淨夜之言垢垢淨兩忘無有間替故名不替唯滅動心妄想分别名曰動心覺照祛之故名為滅不滅照心慧照常明無有間故名不滅照心但凝空心不起一切心名空心不凝住心一切無著名之不凝住心不依一法而心常住若取一法即名著相心不取法名為不依照而常寂故為常住然則凡心躁競其次初學息心甚難或息不得暫停還失言習性煩惱難可滅除定力未成暫停還失也去留交戰百體流行心起染境境來牽心心境相染故名交戰安念不息百非自生名曰百體流行久久精思方乃調熟勿以暫收不得遂廢千生之業定心不起則契真常一念不收千生遂廢少得靜巳初得清淨正慧未生故曰少得靜已則於行立坐卧之時四感儀之時也涉事之處喧閙之所見一切諸相為涉之處起一切諸心名為喧開之所也皆作意安息亂歸寂名為作意恬淡得所名之為安也有事無事常若無心處靜處喧其志惟一有無雙遣寂用俱忘萬法不二名之唯一若束心太急又則成病氣發狂顛是其候也偏心執靜名曰東心心外見相名為顛也心若不動又須放任寬急得所從定發慧名為放任定慧齊融名曰得所自恆調適定多即愚慧多即狂定慧等用名曰調適制而不著放而不動處喧無惡涉事無惱者此是真定寂而常照照而常寂空而常用用而常空得本元寂故為真定不以涉事無惱故求多事不以處喧無惡強來就喧習性塵勞常須制御不可縱逸以無事為真宅見本性空寂故為真宅有事為應跡慧用無邊故為應跡若水鏡之為鑒則隨物而現形本心清淨猶如水鏡照用無礙萬象俱現名為現形善巧方便唯能入定諸法性空寂無所起故為入定慧發遲速則不由人勿令定中急急求慧怠則傷性傷則無慧急求知見真定乃亡貪著諸相故云無慧若定不求慧而慧自生此名真慧心體寂靜妙用無窮故為真定慧而不用實智若愚了無分别名之不用韜光晦跡故曰若愚益資定慧雙美無極寂照齊融故云雙美無極若定中念想多感衆邪妖精百魅隨心應見為心取相諸相應生一切邪魔競來撓亂所見天尊諸仙真人是其祥也此為諸相不可取著唯令定心之上豁然無覆定心之下曠然無基前念不生故云無履後念不起故曰無基舊業日銷新業不造宿習並盡名曰舊業日銷更不起心故各新業不造無所墨礙逈脫塵籠一切無染故名無所墨礙解脫無繫故云逈脫塵籠行而久之自然得道智照不滅名曰行而人之契理合真故云得道夫得道之人凡有七候一者心得定易覺諸塵漏心得清靜塵念畫知故曰覺諸塵漏二者宿疾普銷身心輕爽真氣胎息痼疾盡瘳體道合真身輕不老三者填補夭損還年復命骨髓堅滿故填補夭損駐顏不易名為還年復命也四者延數萬嵗名曰仙人長生不死延數萬歲名編仙籙故曰仙人五者鍊形為氣名曰真人得本元氣故曰鍊形為氣正性無僞故曰真人六者鍊氣成神名曰神人真氣通神隂陽不測故曰神人七者鍊神合道名曰至人真神契道故曰至人其於鑒力隨候益明鑒力者常照不息也益明者明明不絶也得至道成慧乃圓備若了本性得道成真智慧圓明萬法俱備若乃久學定心身無一候促齡穢質色謝方空自云慧覺又稱成道者求道之理實所未然通神合道即得道真成心惑身亡不離生死西升經云是故失生本焉能知道源而說頌曰智起生於境火發生於緑各是真種性承流失道源起心欲息知心起知更煩了知性本空知別衆妙門洞玄靈寶定觀經注終道由心學匪假他求神依形住同有其外我之靈明亘今亘古惟其絏於六情是以戕我正念貪嗔癡昧種種見惑背真向僞無有殫期實惟真師憫念衆生無知故演此妙經作人天規鑑為證道梯航是有定觀之說發揮妙本洞徹玄微縧乎垢氛超乎視聽明無相於有形之後致虛極於未兆之先物我俱忘形神俱妙凡我羽流敬之敬之龍集壬中三月初言泠虛子稽首謹識
