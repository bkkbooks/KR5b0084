front:
  text: 重刋道藏輯要洞玄靈寶定觀經註
  hash: sha256:918f905b228193320f96a4cd9a4877eaec722c2bba3de2743842db74b6ece094
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0084_CK-KZ_01p001a, image: JY035/CK-KZ_JY035_01p001a.png}
body:
  text: 靈者神也在天曰靈寶者珍也在地曰寶天有靈化神用不測則廣覆無邊地有眾寶濟養羣品則厚載萬物言此經如天如地能覆能載有靈有寶功德無窮證得此心故名靈寶定者心定也如地不動觀者慧觀也如天常照定體無念慧照無邊定慧等修故名定觀天尊告左玄眞人曰左者定也玄者深妙也眞者純也一而無雜人者通理達性之人也曰者語辭也夫欲修道進趣之心名爲修道先能捨事一切無染名爲捨事外事都絕六塵爲外事須遠離也六塵者色聲香味觸法更不染著名爲都絕無與忤心境不來忤心卽無惱心不起染境則無煩心境兩忘卽無煩惱故名無與忤心然後安坐攝澄煩惱名之爲安本心不起名之爲坐內觀心起若覺一念起須除滅務令安靜慧心內照名曰內觀漏念未除名爲心起前念忽起後覺則隨起心旣滅覺照亦忘故稱除滅了心不起名之爲安覺性不動名之爲靜故稱安靜其次雖非的有貪著浮遊亂想亦盡除滅眾心不起妄念悉忘亂想不生何有貪著故曰滅除晝夜勤行須臾不替晝之言淨夜之言垢垢淨兩忘無有間替故名不替惟滅動心妄想分别名曰動心覺照祛之故名爲滅不滅照心慧照常明無有間故名不滅照心但凝空心不起一切心名空心不凝住心一切無著名之不凝住心不依一法而心常住若取一法卽名著相心不取法名爲不依照而常寂故爲常住然則凡心躁競其次初學息心甚難或息不得蹔停還失言習性煩惱難可滅除定力未成蹔停還失也去留交戰百體流行心起染境境來牽心心境相染故名交戰妄念不息百非自生名曰百體流行久久精思方乃調熟勿以蹔收不得遂廢千生之業定心不起則契眞常一念不收千生遂廢少得靜己初得淸淨正慧未生故曰少得靜己則於行立坐卧之時四威儀之時也涉事之處諠閙之所見一切諸相爲涉之處起一切諸心名爲諠閙之所也皆作意安息亂歸寂名爲作意恬淡得所名之爲安也有事無事常若無心處靜處喧其志惟一有無雙遣寂用俱忘萬法不二名之唯一若束心太急又則成病氣發狂顛是其候也偏心執靜名曰束心心外見相名爲顚也心若不動又須放任寛急得所從定發慧名爲放任定慧齊融名曰得所自恒調適定多卽愚慧多卽狂定慧等用名曰調適制而不著放而不動處喧無惡涉事無惱者此是眞定寂而常照照而常寂空而常用用而常空得本元寂故爲眞定不以渉事無惱故求多事不以處喧無惡强來就諠習性塵勞常須制御不可縱逸以無事爲眞宅見本性空寂故爲眞宅有事爲應跡慧用無邊故爲應跡若水鏡之爲鑒則隨物而現形本心淸淨猶如水鏡照用無碍萬象俱現名爲現形善巧方便唯能入定諸法性空寂無所起故爲入定慧發遲速則不由人勿令定中急急求慧急則傷性傷則無慧急求知見眞定乃亡貪著諸相故云無慧若定不求慧而慧自生此名眞慧心體寂靜妙用無窮故爲眞定慧而不用實智若愚了無分别名之不用韜光晦跡故曰若愚益資定慧雙美無極寂照齊融故云雙美無極若定中念想多感眾邪妖精百魅隨心應見爲心取相諸相應生一切邪魔競來撓亂所見天尊諸仙眞人是其祥也此爲諸相不可取著唯令定心之上豁然無覆定心之下曠然無基前念不生故云無覆後念不起故曰無基舊業日銷新業不造宿習並盡名曰舊業日銷更不起心故名新業不造無所罣礙迥脫塵籠一切無染故名無所罣礙解脫無繫故云迥脫塵籠行而久之自然得道智照不滅名曰行而久之契理合眞故云得道夫得道之人凡有七候一者心得定易覺諸塵漏心得淸靜塵念盡知故曰覺諸塵漏二者宿疾普銷身心輕爽眞氣胎息痼疾盡瘳體道合眞身輕不老三者塡補夭損還年復命骨髓堅滿故塡補夭損駐顏不易名爲還年復命也四者延數萬𡻕名曰仙人長生不死延數萬𡻕名編仙籙故曰仙人五者鍊形爲氣名曰眞人得本元氣故曰鍊形爲氣正性無僞故曰眞人六者鍊氣成神名曰神人眞氣通神陰陽不測故曰神人七者鍊神合道名曰至人眞神契道故曰至人其於鑒力隨候益明鑒力者常照不息也益明者明明不絕也得至道成慧乃圓備若了本性得道成眞智慧圓明萬法俱備若乃久學定心身無一候促齡穢質色謝方空自云慧覺又稱成道者求道之理實所未然通神合道卽得道眞成心惑身亡不離生死西昇經云是故失生本焉能知道源而說頌曰智起生於境火發生於緣各是眞種性承流失道源起心欲息知心起知更煩了知性本空知則眾妙門洞玄靈寶定觀經註終道由心學匪假佗求神依形住罔有其外我之靈明亘今亘古惟其絏於六情是以戕我正念貪嗔癡昧種種見惑背眞向僞無有殫期寔惟眞師憫念眾生無知故演此妙經作人天規鑑爲證道梯航是有定觀之說發揮妙本洞徹玄微滌乎垢氛超乎視聽明無相於有形之後致虛極於未兆之先物我俱忘形神俱妙凡我羽流敬之敬之龍集壬申三月初吉冷虛子稽首謹識
